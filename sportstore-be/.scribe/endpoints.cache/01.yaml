bft k\u1ebf t\u1ed1c \u0111\u1ed9 v\u00e0 m\u1ea1nh m\u1ebd.\nCh\u1ea5t li\u1ec7u Wikarotex co gi\u00e3n 4 chi\u1ec1u, m\u1ec1m m\u00e1t, gi\u1eef form b\u1ec1n.\nC\u00f4ng ngh\u1ec7 Witech-dry tho\u00e1t m\u1ed3 h\u00f4i nhanh, t\u1ed1i \u01b0u cho thi \u0111\u1ea5u.\nForm Regular Fit d\u1ec5 m\u1eb7c, h\u1ecda ti\u1ebft b\u1ec1n m\u00e0u, logo PU ph\u1ea3n quang.\nSize: S\u2013XXL, ph\u00f9 h\u1ee3p c\u1ea3 nam &amp; n\u1eef.\n\u0110\u1eb7t \u00e1o \u0111\u1ed9i li\u00ean h\u1ec7 \u201cCHAT ZALO\u201d \u0111\u1ec3 \u0111\u01b0\u1ee3c \u01b0u \u0111\u00e3i!","mo_ta_day_du":"<p><span style=\"font-size: 100%;color: #000000\">Wika Wind \u2013 t\u00e2n binh \u0111\u1ea7y b\u00f9ng n\u1ed5 v\u1eeba ch\u00ednh th\u1ee9c ra m\u1eaft, mang theo tinh th\u1ea7n t\u1ed1c \u0111\u1ed9 v\u00e0 phong c\u00e1ch thi\u1ebft k\u1ebf hi\u1ec7n \u0111\u1ea1i. L\u1ea5y c\u1ea3m h\u1ee9ng t\u1eeb chuy\u1ec3n \u0111\u1ed9ng m\u1ea1nh m\u1ebd c\u1ee7a c\u01a1n l\u1ed1c xo\u00e1y, h\u1ecda ti\u1ebft bao ph\u1ee7 th\u00e2n \u00e1o gi\u00fap t\u1ea1o c\u1ea3m gi\u00e1c nhanh \u2013 g\u1ecdn \u2013 m\u1ea1nh trong t\u1eebng \u0111\u01b0\u1eddng b\u00f3ng, tr\u1edf th\u00e0nh l\u1ef1a ch\u1ecdn l\u00fd t\u01b0\u1edfng cho nh\u1eefng tr\u1eadn \u0111\u1ea5u \u0111\u00f2i h\u1ecfi s\u1ef1 linh ho\u1ea1t v\u00e0 b\u1ee9t ph\u00e1.<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\"><strong>Thi\u1ebft k\u1ebf \u1ea5n t\u01b0\u1ee3ng \u2013 T\u1ed1i \u01b0u cho v\u1eadn \u0111\u1ed9ng<\/strong><\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">\u00c1o s\u1edf h\u1eefu form Regular Fit d\u1ec5 m\u1eb7c, \u00f4m g\u1ecdn c\u01a1 th\u1ec3 v\u1eeba \u0111\u1ee7 \u0111\u1ec3 t\u00f4n d\u00e1ng m\u00e0 v\u1eabn \u0111\u1ea3m b\u1ea3o tho\u1ea3i m\u00e1i khi di chuy\u1ec3n.<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">C\u1ed5 tr\u00f2n \u0111i k\u00e8m ph\u1ea7n vi\u1ec1n c\u1ed5 v\u00e0 tay \u00e1o ph\u1ed1i m\u00e0u \u0111\u1ed3ng \u0111i\u1ec7u, t\u1ea1o n\u00ean t\u1ed5ng th\u1ec3 li\u1ec1n m\u1ea1ch, th\u1ec3 thao v\u00e0 chuy\u00ean nghi\u1ec7p h\u01a1n.<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\"><strong>Ch\u1ea5t li\u1ec7u cao c\u1ea5p \u2013 S\u1eb5n s\u00e0ng cho m\u1ecdi tr\u1eadn \u0111\u1ea5u<\/strong><\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">Wika Wind \u0111\u01b0\u1ee3c ho\u00e0n thi\u1ec7n t\u1eeb ch\u1ea5t li\u1ec7u Wikarotex co gi\u00e3n 4 chi\u1ec1u, m\u1ec1m \u2013 m\u00e1t \u2013 \u00f4m form l\u00e2u d\u00e0i, gi\u00fap b\u1ea1n t\u1ef1 tin thi \u0111\u1ea5u t\u1eeb \u0111\u1ea7u \u0111\u1ebfn cu\u1ed1i tr\u1eadn.<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">K\u1ebft h\u1ee3p c\u00f9ng c\u00f4ng ngh\u1ec7 Witech-dry, \u00e1o tho\u00e1t m\u1ed3 h\u00f4i nhanh, gi\u1eef c\u01a1 th\u1ec3 lu\u00f4n kh\u00f4 tho\u00e1ng ngay c\u1ea3 khi v\u1eadn \u0111\u1ed9ng c\u01b0\u1eddng \u0111\u1ed9 cao.<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\"><strong>Nh\u1eefng \u01b0u \u0111i\u1ec3m n\u1ed5i b\u1eadt:<\/strong><\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">Ch\u1ea5t li\u1ec7u Wikarotex 4-way stretch \u0111\u00e0n h\u1ed3i t\u1ed1t, tho\u00e1ng nh\u1eb9<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">C\u00f4ng ngh\u1ec7 Witech-dry gi\u00fap th\u1ea5m h\u00fat \u2013 tho\u00e1t m\u1ed3 h\u00f4i c\u1ef1c nhanh<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">Ho\u1ea1 ti\u1ebft in s\u1eafc n\u00e9t, b\u1ec1n m\u00e0u theo th\u1eddi gian<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">Logo PU ph\u1ea3n quang, n\u1ed5i b\u1eadt trong m\u1ecdi \u0111i\u1ec1u ki\u1ec7n \u00e1nh s\u00e1ng<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">Form Regular Fit ph\u00f9 h\u1ee3p c\u1ea3 nam &amp; n\u1eef<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">T\u00e1i hi\u1ec7n tinh th\u1ea7n \u201cWind\u201d \u2013 t\u1ed1c \u0111\u1ed9, linh ho\u1ea1t, b\u00f9ng n\u1ed5<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">S\u1eb5n s\u00e0ng b\u1ee9t ph\u00e1 m\u1ecdi gi\u1edbi h\u1ea1n.<\/span><\/p>\n<p><span style=\"font-size: 100%;color: #000000\">H\u00e3y kho\u00e1c l\u00ean m\u00ecnh Wika Wind v\u00e0 bi\u1ebfn m\u1ed7i \u0111\u01b0\u1eddng ch\u1ea1y tr\u00ean s\u00e2n th\u00e0nh m\u1ed9t \u201cc\u01a1n l\u1ed1c\u201d mang d\u1ea5u \u1ea5n c\u1ee7a ri\u00eang b\u1ea1n!<\/span><\/p>","gia_goc":"249000.00","gia_khuyen_mai":"239000.00","so_luong_ton_kho":100,"can_nang_kg":null,"noi_bat":false,"trang_thai":true,"da_ban":0,"luot_xem":0,"diem_danh_gia":"0.00","so_luot_danh_gia":0,"created_at":"2026-03-08T07:41:18.000000Z","updated_at":"2026-03-08T07:41:18.000000Z","danh_muc":{"id":7,"danh_muc_cha_id":null,"ten":"\u00c1o B\u00f3ng \u0110\u00e1","duong_dan":"ao-bong-da","hinh_anh":null,"mo_ta":null,"thu_tu":6,"trang_thai":true,"created_at":"2026-03-08T07:41:17.000000Z","updated_at":"2026-03-08T07:41:17.000000Z"},"thuong_hieu":{"id":1,"ten":"Wika Sports","duong_dan":"wika-sports","logo":"https:\/\/wikasports.com\/wp-content\/uploads\/2022\/10\/wika-1.png","mo_ta":"Th\u01b0\u01a1ng hi\u1ec7u th\u1ec3 thao h\u00e0ng \u0111\u1ea7u Vi\u1ec7t Nam, \u0111\u1ed3ng h\u00e0nh c\u00f9ng Quang H\u1ea3i, Ho\u00e0ng \u0110\u1ee9c, C\u00f4ng Ph\u01b0\u1ee3ng.","trang_thai":true,"created_at":"2026-03-08T07:41:17.000000Z","updated_at":"2026-03-08T07:41:17.000000Z"},"anh_chinh":{"id":337,"san_pham_id":43,"duong_dan_anh":"https:\/\/wikasports.com\/wp-content\/uploads\/2025\/11\/ao-bong-da-wika-wind-do-1.jpg","chu_thich":null,"thu_tu":0,"la_anh_chinh":true,"created_at":"2026-03-08 07:41:18","url":"https:\/\/wikasports.com\/wp-content\/uploads\/2025\/11\/ao-bong-da-wika-wind-do-1.jpg"}}],"meta":{"current_page":1,"last_page":4,"per_page":12,"total":44,"from":1,"to":12},"links":{"first":"http:\/\/localhost:8000\/api\/v1\/products?page=1","last":"http:\/\/localhost:8000\/api\/v1\/products?page=4","prev":null,"next":"http:\/\/localhost: